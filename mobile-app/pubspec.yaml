name: darsak_mobile
description: "DarsakAI Mobile - Student App"
publish_to: 'none'
version: 1.2.1+4

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # HTTP
  dio: ^5.7.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure storage for tokens
  flutter_secure_storage: ^9.2.4

  # Charts
  fl_chart: ^0.70.2

  # QR scanner
  mobile_scanner: ^6.0.7

  # Skeleton loading
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.0
  connectivity_plus: ^6.1.0
  google_fonts: ^6.2.1
  image_picker: ^1.0.7
  url_launcher: ^6.2.4
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
