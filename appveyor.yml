version: 1.2.0.{build}

image: Visual Studio 2022

install:
  - curl -sL -o flutter.zip https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_3.44.0-stable.zip
  - tar -xf flutter.zip
  - choco install innosetup --no-progress -y

build_script:
  - set PATH=%APPVEYOR_BUILD_FOLDER%\flutter\bin;%PATH%
  - flutter config --enable-windows-desktop
  - cd desktop_app
  - flutter pub get
  - flutter build windows --release

after_build:
  - 7z a -tzip "%APPVEYOR_BUILD_FOLDER%\DarsakAI-Windows.zip" "%APPVEYOR_BUILD_FOLDER%\desktop_app\build\windows\x64\runner\Release\*" -mx9
  - iscc "%APPVEYOR_BUILD_FOLDER%\desktop_app\installer\setup.iss"

artifacts:
  - path: DarsakAI-Windows.zip
    name: DarsakAI-Windows-zip
  - path: desktop_app\build\windows\x64\runner\Release
    name: DarsakAI-Desktop-Windows
    type: Folder
  - path: desktop_app\build\installer\DarsakAI-Setup.exe
    name: DarsakAI-Setup

on_success:
  - ps: |
      $tag = "v1.0.0"
      $token = "${env:GITHUB_TOKEN}"
      if (-not $token) { Write-Host "GITHUB_TOKEN not set, skipping deploy"; return }
      $headers = @{ Authorization = "Bearer $token"; Accept = "application/vnd.github+json" }
      $uploadUrl = "https://uploads.github.com/repos/rootkali-cmd/Darsak-ai/releases/$(gh release view $tag --json id --jq '.id')/assets"
      foreach ($file in @("$env:APPVEYOR_BUILD_FOLDER\DarsakAI-Windows.zip", "$env:APPVEYOR_BUILD_FOLDER\desktop_app\build\installer\DarsakAI-Setup.exe")) {
        $name = Split-Path $file -Leaf
        Write-Host "Uploading $name..."
        curl.exe -s -X POST -H "Authorization: Bearer $token" -H "Content-Type: application/octet-stream" "$uploadUrl?name=$name&overwrite=true" --data-binary "@$file" | Out-Null
      }
