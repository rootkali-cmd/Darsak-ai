version: 1.1.0.{build}

image: Visual Studio 2022

install:
  - curl -sL -o flutter.zip https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_3.44.0-stable.zip
  - tar -xf flutter.zip

build_script:
  - set PATH=%APPVEYOR_BUILD_FOLDER%\flutter\bin;%PATH%
  - flutter config --enable-windows-desktop
  - cd desktop_app
  - flutter pub get
  - flutter build windows --release

after_build:
  - cd build\windows\x64\release
  - 7z a -tzip "%APPVEYOR_BUILD_FOLDER%\DarsakAI-Windows.zip" * -mx9

artifacts:
  - path: DarsakAI-Windows.zip
    name: DarsakAI-Windows-zip

  - path: desktop_app\build\windows\x64\release
    name: DarsakAI-Desktop-Windows
    type: Folder

deploy: off
