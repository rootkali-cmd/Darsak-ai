version: 1.1.0.{build}

image: Visual Studio 2022

install:
  - ps: |
      # Remove pre-installed Flutter from PATH to avoid conflicts
      $env:Path = ($env:Path.Split(';') | Where-Object { $_ -notmatch 'flutter' }) -join ';'
      # Download Flutter
      $FLUTTER_URL = "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_3.44.0-stable.zip"
      $FLUTTER_ZIP = "$env:APPVEYOR_BUILD_FOLDER\flutter.zip"
      $FLUTTER_DIR = "$env:APPVEYOR_BUILD_FOLDER\flutter"
      Write-Host "Downloading latest Flutter..."
      Invoke-WebRequest -Uri $FLUTTER_URL -OutFile $FLUTTER_ZIP -UseBasicParsing
      Write-Host "Extracting..."
      Expand-Archive -Path $FLUTTER_ZIP -DestinationPath $env:APPVEYOR_BUILD_FOLDER
      # Prepend to PATH
      $env:Path = "$FLUTTER_DIR\bin;$env:Path"
      cmd /c "flutter config --enable-windows-desktop" 2>&1
      if ($LASTEXITCODE -ne 0) { Write-Host "[WARN] flutter config exited with code $LASTEXITCODE (non-fatal)" }
  - flutter --version

build_script:
  - cd desktop_app
  - flutter pub get
  - flutter build windows --release

after_build:
  - cd build\windows\x64\release
  - 7z a -tzip "%APPVEYOR_BUILD_FOLDER%\DarsakAI-Windows.zip" * -mx9

artifacts:
  - path: DarsakAI-Windows.zip
    name: DarsakAI-Windows-zip

  - path: desktop_app\build\windows\x64\release
    name: DarsakAI-Desktop-Windows
    type: Folder

deploy: off
