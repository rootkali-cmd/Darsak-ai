name: darsak_desktop
description: "DarsakAI Desktop App - Offline-first teacher dashboard"
publish_to: 'none'
version: 1.3.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # HTTP
  dio: ^5.7.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^6.1.0

  # Utils
  intl: ^0.20.0
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  encrypt: ^5.0.3
  crypto: ^3.0.6

  # Local P2P sync
  web_socket_channel: ^3.0.1

  # Fonts
  google_fonts: ^6.2.1

  # Barcode
  barcode: ^2.2.8
  printing: ^5.13.1
  file_picker: ^11.0.2
  csv: ^8.0.0
  path_provider: ^2.1.5
  url_launcher: ^6.2.4
  package_info_plus: ^8.3.0
  window_manager: ^0.4.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
