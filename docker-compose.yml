services:
  redis:
    image: redis:7-alpine
    container_name: darsak-redis
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - darsak-network

  ollama:
    image: ollama/ollama:latest
    container_name: darsak-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - darsak-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: darsak-backend
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - darsak-network

  web:
    build:
      context: ./web-portal
      dockerfile: Dockerfile
    container_name: darsak-web
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    networks:
      - darsak-network

  nginx:
    image: nginx:alpine
    container_name: darsak-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/var/www/certbot
      - certbot_config:/etc/letsencrypt
    depends_on:
      - backend
      - web
    restart: unless-stopped
    networks:
      - darsak-network

volumes:
  redis_data:
  ollama_data:
  certbot_data:
  certbot_config:

networks:
  darsak-network:
    driver: bridge
