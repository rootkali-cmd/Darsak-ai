trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'desktop_app/**'

pr: none

pool:
  vmImage: 'windows-latest'

steps:
  - powershell: |
      # Install Flutter SDK
      $FLUTTER_VERSION = "3.24.5"
      $FLUTTER_URL = "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_$FLUTTER_VERSION-stable.zip"
      $FLUTTER_ZIP = "$env:AGENT_TEMPDIRECTORY\flutter.zip"
      $FLUTTER_DIR = "$env:AGENT_TEMPDIRECTORY\flutter"

      Write-Host "Downloading Flutter $FLUTTER_VERSION..."
      Invoke-WebRequest -Uri $FLUTTER_URL -OutFile $FLUTTER_ZIP -UseBasicParsing

      Write-Host "Extracting..."
      Expand-Archive -Path $FLUTTER_ZIP -DestinationPath $env:AGENT_TEMPDIRECTORY

      Write-Host "Adding Flutter to PATH..."
      Write-Host "##vso[task.prependpath]$FLUTTER_DIR\bin"

      Write-Host "Enabling Windows desktop..."
      flutter config --enable-windows-desktop

      flutter --version
    displayName: 'Install Flutter SDK'

  - powershell: |
      # Ensure Windows platform support exists
      if (-not (Test-Path "windows")) {
        flutter create --platforms=windows .
        Write-Host "Windows platform created"
      } else {
        Write-Host "Windows platform already exists"
      }
    displayName: 'Ensure Windows platform support'
    workingDirectory: desktop_app

  - script: flutter pub get
    displayName: 'Install dependencies'
    workingDirectory: desktop_app

  - script: flutter build windows --release
    displayName: 'Build Windows release'
    workingDirectory: desktop_app

  - powershell: |
      Compress-Archive -Path build\windows\x64\release\* -DestinationPath "$(Build.ArtifactStagingDirectory)\DarsakAI-Windows.zip" -Force
    displayName: 'Create ZIP archive'
    workingDirectory: desktop_app

  - task: PublishPipelineArtifact@1
    displayName: 'Upload build artifacts'
    inputs:
      targetPath: 'desktop_app/build/windows/x64/release'
      artifactName: 'DarsakAI-Desktop-Windows'

  - task: PublishPipelineArtifact@1
    displayName: 'Upload ZIP'
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)'
      artifactName: 'DarsakAI-Windows-zip'
