name: Build & Deploy Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/build_android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/release.keystore

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEYSTORE_ALIAS }}" >> android/key.properties
          echo "storeFile=release.keystore" >> android/key.properties

      - run: flutter pub get

      - run: flutter build apk --release --split-per-abi

      - run: flutter build apk --release

      - name: Compute SHA256
        id: sha256
        run: |
          UNIVERSAL=$(ls build/app/outputs/flutter-apk/DarsakAI-Student-*-universal.apk 2>/dev/null || ls build/app/outputs/flutter-apk/app-release.apk)
          ARM64=$(ls build/app/outputs/flutter-apk/DarsakAI-Student-*-arm64-v8a.apk 2>/dev/null || ls build/app/outputs/flutter-apk/app-arm64-v8a-release.apk)
          ARMV7=$(ls build/app/outputs/flutter-apk/DarsakAI-Student-*-armeabi-v7a.apk 2>/dev/null || ls build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk)
          X86_64=$(ls build/app/outputs/flutter-apk/DarsakAI-Student-*-x86_64.apk 2>/dev/null || ls build/app/outputs/flutter-apk/app-x86_64-release.apk)

          echo "universal_sha256=$(sha256sum "$UNIVERSAL" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "arm64_sha256=$(sha256sum "$ARM64" | cut -d' ' -f1)" >> $GITHUB_OUTPUT

          echo "universal_size=$(stat -c%s "$UNIVERSAL")" >> $GITHUB_OUTPUT
          echo "arm64_size=$(stat -c%s "$ARM64")" >> $GITHUB_OUTPUT

          echo "universal_path=$UNIVERSAL" >> $GITHUB_OUTPUT
          echo "arm64_path=$ARM64" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.0"
          gh release upload "$TAG" --clobber "${{ steps.sha256.outputs.universal_path }}"
          gh release upload "$TAG" --clobber "${{ steps.sha256.outputs.arm64_path }}"

      - name: Rename APKs for backward compatibility
        run: |
          UNIVERSAL="${{ steps.sha256.outputs.universal_path }}"
          cp "$UNIVERSAL" build/app/outputs/flutter-apk/DarsakAI-Student.apk

      - name: Upload backward-compatible APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v1.0.0 --clobber "build/app/outputs/flutter-apk/DarsakAI-Student.apk#DarsakAI-Student.apk"
