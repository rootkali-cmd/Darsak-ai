name: Build & Deploy Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/build_android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/release.keystore

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEYSTORE_ALIAS }}" >> android/key.properties
          echo "storeFile=release.keystore" >> android/key.properties

      - run: flutter pub get

      - name: Build universal APK
        run: flutter build apk --release

      - name: Build per-abi APKs
        run: flutter build apk --release --split-per-abi

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | sed 's/+.*//')
          BUILD=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | sed 's/.*+//' | sed "s/'//g")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Rename APK files with version
        run: |
          APK_DIR="build/app/outputs/flutter-apk"
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build }}"

          # Rename universal
          if [ -f "$APK_DIR/app-release.apk" ]; then
            mv "$APK_DIR/app-release.apk" "$APK_DIR/DarsakAI-Student-v${VERSION}+${BUILD}-universal.apk"
          fi

          # Rename per-abi
          for abi in arm64-v8a armeabi-v7a x86_64; do
            if [ -f "$APK_DIR/app-${abi}-release.apk" ]; then
              mv "$APK_DIR/app-${abi}-release.apk" "$APK_DIR/DarsakAI-Student-v${VERSION}+${BUILD}-${abi}.apk"
            fi
          done

      - name: Compute SHA256
        id: sha256
        run: |
          APK_DIR="build/app/outputs/flutter-apk"
          UNIVERSAL=$(ls "$APK_DIR"/DarsakAI-Student-*-universal.apk 2>/dev/null | head -1)
          ARM64=$(ls "$APK_DIR"/DarsakAI-Student-*-arm64-v8a.apk 2>/dev/null | head -1)
          ARMV7=$(ls "$APK_DIR"/DarsakAI-Student-*-armeabi-v7a.apk 2>/dev/null | head -1)

          if [ -n "$UNIVERSAL" ]; then
            echo "universal_sha256=$(sha256sum "$UNIVERSAL" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
            echo "universal_size=$(stat -c%s "$UNIVERSAL")" >> $GITHUB_OUTPUT
            echo "universal_path=$UNIVERSAL" >> $GITHUB_OUTPUT
          fi
          if [ -n "$ARM64" ]; then
            echo "arm64_sha256=$(sha256sum "$ARM64" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
            echo "arm64_size=$(stat -c%s "$ARM64")" >> $GITHUB_OUTPUT
            echo "arm64_path=$ARM64" >> $GITHUB_OUTPUT
          fi

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.0"
          if [ -n "${{ steps.sha256.outputs.universal_path }}" ]; then
            gh release upload "$TAG" --clobber "${{ steps.sha256.outputs.universal_path }}"
          fi
          if [ -n "${{ steps.sha256.outputs.arm64_path }}" ]; then
            gh release upload "$TAG" --clobber "${{ steps.sha256.outputs.arm64_path }}"
          fi

      - name: Upload backward-compatible APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_DIR="build/app/outputs/flutter-apk"
          UNIVERSAL=$(ls "$APK_DIR"/DarsakAI-Student-*-universal.apk 2>/dev/null | head -1)
          if [ -n "$UNIVERSAL" ]; then
            cp "$UNIVERSAL" "$APK_DIR/DarsakAI-Student.apk"
            gh release upload v1.0.0 --clobber "$APK_DIR/DarsakAI-Student.apk#DarsakAI-Student.apk"
          fi
