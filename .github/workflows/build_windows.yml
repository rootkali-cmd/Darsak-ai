name: Build & Deploy Desktop Windows

on:
  push:
    branches: [main]
    paths:
      - 'desktop_app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Installer
        run: iscc installer/setup.iss

      - name: Create ZIP
        run: |
          powershell Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath ${{ runner.temp }}\DarsakAI-Windows.zip -Force

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v1.0.0"
          $release = gh release view $tag --json uploadUrl --jq '.uploadUrl' 2>$null
          if (-not $release) {
            gh release create $tag --title "DarsakAI v1.0.0" --notes "تحديث تلقائي" --latest
          }
          gh release upload $tag --clobber "${{ runner.temp }}\DarsakAI-Windows.zip"
          gh release upload $tag --clobber "build\installer\DarsakAI-Setup-1.1.0.exe"
