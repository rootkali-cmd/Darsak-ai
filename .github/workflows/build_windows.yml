name: Build Windows Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.0'
  RELEASE_TAG: 'v1.0.0'
  APP_VERSION: '1.4.0'

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop_app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - run: flutter clean && flutter pub get
      - run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Installer
        run: iscc installer/setup.iss

      - name: Create ZIP
        shell: powershell
        run: |
          $temp = "$env:RUNNER_TEMP".Replace('\', '/')
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "$temp/DarsakAI-Windows.zip" -Force

      - name: Verify assets
        shell: powershell
        run: |
          $temp = "$env:RUNNER_TEMP".Replace('\', '/')
          $exe = "build\installer\DarsakAI-Setup.exe"
          $zip = "$temp/DarsakAI-Windows.zip"
          if (-not (Test-Path $exe)) { throw "EXE not found at $exe" }
          if (-not (Test-Path $zip)) { throw "ZIP not found at $zip" }
          Write-Output "✅ EXE: $exe"
          Write-Output "✅ ZIP: $zip"

      - name: SHA256
        id: sha256
        shell: powershell
        run: |
          $temp = "$env:RUNNER_TEMP".Replace('\', '/')
          $exeHash = (Get-FileHash "build\installer\DarsakAI-Setup.exe" -Algorithm SHA256).Hash.ToLower()
          $zipHash = (Get-FileHash "$temp/DarsakAI-Windows.zip" -Algorithm SHA256).Hash.ToLower()
          echo "exe_sha256=$exeHash" >> $env:GITHUB_OUTPUT
          echo "zip_sha256=$zipHash" >> $env:GITHUB_OUTPUT

      - name: Changelog
        id: changelog
        shell: bash
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log --oneline --no-decorate HEAD~10..HEAD 2>/dev/null || echo "- تحديث"
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TEMP="${RUNNER_TEMP//\\//}"
          gh release upload ${{ env.RELEASE_TAG }} --clobber "$TEMP/DarsakAI-Windows.zip"
          gh release upload ${{ env.RELEASE_TAG }} --clobber "build/installer/DarsakAI-Setup.exe"

      - name: latest-stable.json
        shell: bash
        run: |
          TEMP="${RUNNER_TEMP//\\//}"
          VERSION="${{ env.APP_VERSION }}"
          BUILD=${{ github.run_number }}
          EXE_SHA256="${{ steps.sha256.outputs.exe_sha256 }}"
          cat > "$TEMP/latest-stable.json" << JSONEOF
          {"channel":"stable","version":"${VERSION}","build":${BUILD},"sha256":"${EXE_SHA256}","download_url":"https://github.com/rootkali-cmd/Darsak-ai/releases/download/${{ env.RELEASE_TAG }}/DarsakAI-Setup.exe"}
          JSONEOF
          gh release upload ${{ env.RELEASE_TAG }} --clobber "$TEMP/latest-stable.json#latest-stable.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: latest-beta.json
        shell: bash
        run: |
          TEMP="${RUNNER_TEMP//\\//}"
          VERSION="${{ env.APP_VERSION }}-beta.1"
          BUILD=${{ github.run_number }}
          EXE_SHA256="${{ steps.sha256.outputs.exe_sha256 }}"
          cat > "$TEMP/latest-beta.json" << JSONEOF
          {"channel":"beta","version":"${VERSION}","build":${BUILD},"sha256":"${EXE_SHA256}","download_url":"https://github.com/rootkali-cmd/Darsak-ai/releases/download/${{ env.RELEASE_TAG }}/DarsakAI-Setup.exe"}
          JSONEOF
          gh release upload ${{ env.RELEASE_TAG }} --clobber "$TEMP/latest-beta.json#latest-beta.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
