name: Build Windows Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop_app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Installer
        run: iscc installer/setup.iss

      - name: Create ZIP
        run: powershell Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath ${{ runner.temp }}\DarsakAI-Windows.zip -Force

      - name: Verify assets
        shell: powershell
        run: |
          $exe = "build\installer\DarsakAI-Setup.exe"
          $zip = "${{ runner.temp }}\DarsakAI-Windows.zip"
          if (-not (Test-Path $exe)) { throw "EXE not found" }
          if (-not (Test-Path $zip)) { throw "ZIP not found" }

      - name: SHA256
        id: sha256
        shell: powershell
        run: |
          $exeHash = (Get-FileHash "build\installer\DarsakAI-Setup.exe" -Algorithm SHA256).Hash.ToLower()
          $zipHash = (Get-FileHash "${{ runner.temp }}\DarsakAI-Windows.zip" -Algorithm SHA256).Hash.ToLower()
          echo "exe_sha256=$exeHash" >> $env:GITHUB_OUTPUT
          echo "zip_sha256=$zipHash" >> $env:GITHUB_OUTPUT

      - name: Changelog
        id: changelog
        shell: bash
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log --oneline --no-decorate HEAD~10..HEAD 2>/dev/null || echo "- تحديث"
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload v1.0.0 --clobber "${{ runner.temp }}/DarsakAI-Windows.zip"
          gh release upload v1.0.0 --clobber "build/installer/DarsakAI-Setup.exe"

      - name: latest-stable.json
        shell: bash
        run: |
          VERSION="1.3.0"
          BUILD=${{ github.run_number }}
          EXE_SHA256="${{ steps.sha256.outputs.exe_sha256 }}"
          cat > ${{ runner.temp }}/latest-stable.json << JSONEOF
          {"channel":"stable","version":"${VERSION}","build":${BUILD},"sha256":"${EXE_SHA256}","download_url":"https://github.com/rootkali-cmd/Darsak-ai/releases/download/v1.0.0/DarsakAI-Setup.exe"}
          JSONEOF
          gh release upload v1.0.0 --clobber "${{ runner.temp }}/latest-stable.json#latest-stable.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: latest-beta.json
        shell: bash
        run: |
          VERSION="1.3.0-beta.1"
          BUILD=${{ github.run_number }}
          EXE_SHA256="${{ steps.sha256.outputs.exe_sha256 }}"
          cat > ${{ runner.temp }}/latest-beta.json << JSONEOF
          {"channel":"beta","version":"${VERSION}","build":${BUILD},"sha256":"${EXE_SHA256}","download_url":"https://github.com/rootkali-cmd/Darsak-ai/releases/download/v1.0.0/DarsakAI-Setup.exe"}
          JSONEOF
          gh release upload v1.0.0 --clobber "${{ runner.temp }}/latest-beta.json#latest-beta.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
