name: Build & Deploy Linux

on:
  push:
    branches: [main]
    paths:
      - 'desktop_app/**'
      - '.github/workflows/build_linux.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop_app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsqlite3-dev

      - run: flutter config --enable-linux-desktop

      - run: flutter pub get

      - name: Get version from pubspec
        id: version
        run: |
          FULL=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | sed "s/'//g")
          SEMVER=$(echo "$FULL" | sed 's/+.*//')
          echo "app_version=$SEMVER" >> $GITHUB_OUTPUT

      - run: flutter build linux --release

      - name: Create tar.gz with version
        run: |
          VERSION="${{ steps.version.outputs.app_version }}"
          tar -czf ${{ runner.temp }}/DarsakAI-Linux-v${VERSION}.tar.gz -C build/linux/x64/release/bundle .

      - name: Verify Release Assets
        run: |
          VERSION="${{ steps.version.outputs.app_version }}"
          if [ ! -f "${{ runner.temp }}/DarsakAI-Linux-v${VERSION}.tar.gz" ]; then
            echo "ERROR: Linux archive not found"
            exit 1
          fi
          SIZE=$(stat -c%s "${{ runner.temp }}/DarsakAI-Linux-v${VERSION}.tar.gz")
          if [ "$SIZE" -eq 0 ]; then
            echo "ERROR: Linux archive is empty"
            exit 1
          fi
          echo "Archive size: $SIZE bytes"

      - name: Compute SHA256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.app_version }}"
          HASH=$(sha256sum "${{ runner.temp }}/DarsakAI-Linux-v${VERSION}.tar.gz" | cut -d' ' -f1)
          echo "sha256=$HASH" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.app_version }}"
          gh release upload v1.0.0 --clobber "${{ runner.temp }}/DarsakAI-Linux-v${VERSION}.tar.gz"

      - name: Generate latest-stable.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.app_version }}"
          BUILD=${{ github.run_number }}
          SIZE=$(stat -c%s "${{ runner.temp }}/DarsakAI-Linux-v${VERSION}.tar.gz" 2>/dev/null || echo 0)
          SIZE_MB=$((SIZE / 1048576))
          DATE=$(date +%Y-%m-%d)
          SHA256="${{ steps.sha256.outputs.sha256 }}"
          cat > ${{ runner.temp }}/latest-stable.json << JSONEOF
          {
            "channel": "stable",
            "version": "${VERSION}",
            "build": ${BUILD},
            "mandatory": false,
            "min_supported_version": "1.0.0",
            "rollout": 100,
            "sha256": "${SHA256}",
            "changelog": [
              "تحسين نظام التحديث التلقائي",
              "إصلاح مشكلة عدم الاتصال بالإنترنت",
              "إصلاح مشكلة تعيين PIN للطلاب",
              "تحسين الأداء والاستقرار"
            ],
            "changelog_en": [
              "Improved auto-update system",
              "Fixed offline detection issue",
              "Fixed student PIN setting issue",
              "Performance and stability improvements"
            ],
            "download_url": "https://github.com/rootkali-cmd/Darsak-ai/releases/download/v1.0.0/DarsakAI-Linux-v${VERSION}.tar.gz",
            "size_mb": ${SIZE_MB},
            "release_date": "${DATE}"
          }
          JSONEOF
          gh release upload v1.0.0 --clobber "${{ runner.temp }}/latest-stable.json#latest-stable.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest-beta.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.app_version }}-beta.1"
          BUILD=${{ github.run_number }}
          SIZE=$(stat -c%s "${{ runner.temp }}/DarsakAI-Linux-v${VERSION}.tar.gz" 2>/dev/null || echo 0)
          SIZE_MB=$((SIZE / 1048576))
          DATE=$(date +%Y-%m-%d)
          SHA256="${{ steps.sha256.outputs.sha256 }}"
          cat > ${{ runner.temp }}/latest-beta.json << JSONEOF
          {
            "channel": "beta",
            "version": "${VERSION}",
            "build": ${BUILD},
            "mandatory": false,
            "min_supported_version": "1.0.0",
            "rollout": 25,
            "sha256": "${SHA256}",
            "changelog": [
              "اختبار تجريبي",
              "تحسينات الأمان",
              "إصلاح أخطاء"
            ],
            "changelog_en": [
              "Beta test",
              "Security improvements",
              "Bug fixes"
            ],
            "download_url": "https://github.com/rootkali-cmd/Darsak-ai/releases/download/v1.0.0/DarsakAI-Linux-v${VERSION}.tar.gz",
            "size_mb": ${SIZE_MB},
            "release_date": "${DATE}"
          }
          JSONEOF
          gh release upload v1.0.0 --clobber "${{ runner.temp }}/latest-beta.json#latest-beta.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
