name: Keep Backend Warm
on:
  schedule:
    - cron: '*/4 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -sSf -o /dev/null -w "%{http_code}" https://darsak-ai-o8cs.vercel.app/health
      - name: Ping Telegram webhook (re-set if needed)
        run: curl -sSf -o /dev/null -w " %{http_code}" -X POST https://darsak-ai-o8cs.vercel.app/api/setup-telegram-webhook
