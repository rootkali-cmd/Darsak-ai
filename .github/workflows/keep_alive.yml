name: Keep Backend Warm
on:
  schedule:
    - cron: '*/4 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health
        run: |
          CODE=$(curl -sSf -o /dev/null -w "%{http_code}" --max-time 10 https://darsak-ai-o8cs.vercel.app/health)
          echo "Backend health: $CODE"
          [ "$CODE" = "200" ] || exit 1
      - name: Ping Website
        run: |
          CODE=$(curl -sSf -o /dev/null -w "%{http_code}" --max-time 10 https://darsak-ai.vercel.app)
          echo "Website: $CODE"
          [ "$CODE" = "200" ] || exit 1
      - name: Ping Download Page
        run: |
          CODE=$(curl -sSf -o /dev/null -w "%{http_code}" --max-time 10 https://darsak-ai.vercel.app/download)
          echo "Download page: $CODE"
          [ "$CODE" = "200" ] || exit 1
      - name: Ping Telegram Webhook
        run: |
          CODE=$(curl -sSf -o /dev/null -w "%{http_code}" --max-time 10 -X POST https://darsak-ai-o8cs.vercel.app/api/setup-telegram-webhook)
          echo "Telegram webhook: $CODE"
